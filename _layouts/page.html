layout: default

<section class="page-hero shell narrow-shell reveal">

  <h1>{{ page.title }}</h1>
  {% if page.description %}<p class="page-lead">{{ page.description }}</p>{% endif %}
</section>

<article class="prose shell narrow-shell reveal reveal-delay-1">
  {{ content }}
</article>
