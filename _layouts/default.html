<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f7f5ef">

  {% assign page_title = page.title | default: site.title %}
  {% if page.url == '/' %}
    <title>{{ site.title }} — 统计、数据与工程实践</title>
  {% else %}
    <title>{{ page_title }} · {{ site.title }}</title>
  {% endif %}

  <meta name="description" content="{{ page.description | default: site.description | strip_html | escape }}">
  <meta property="og:title" content="{{ page_title | escape }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | escape }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/images/og-cover.png' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = stored || preferred;
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到正文</a>
  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
